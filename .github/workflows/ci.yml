name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: browser-actions/setup-chrome@v1
      - run: python3 -m pip install --user websocket-client
      - run: npm test
